<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦GestureNova✦ Hand-Powered Particle Rave</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --acid: #00ffcc;
            --hot: #ff003c;
            --volt: #ccff00;
            --deep: #0a0a12;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: var(--deep);
            font-family: 'Space Mono', monospace;
            cursor: none;
        }

        canvas { display: block; }

        /* CUSTOM CURSOR */
        #cursor {
            position: fixed;
            width: 20px; height: 20px;
            border: 2px solid var(--acid);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s, width 0.2s, height 0.2s, border-color 0.3s;
            mix-blend-mode: difference;
        }
        #cursor-dot {
            position: fixed;
            width: 4px; height: 4px;
            background: var(--acid);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: background 0.3s;
        }

        /* SCANLINE OVERLAY */
        #scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 10;
        }

        /* VIGNETTE */
        #vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.85) 100%);
            pointer-events: none;
            z-index: 9;
        }

        /* TOP BAR */
        #topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 24px 32px;
            z-index: 100;
            pointer-events: none;
        }

        #logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: clamp(1.4rem, 3vw, 2.2rem);
            color: #fff;
            letter-spacing: -0.02em;
            line-height: 1;
        }
        #logo span { color: var(--acid); }
        #logo .sub {
            font-size: 0.38em;
            font-weight: 400;
            letter-spacing: 0.25em;
            color: rgba(255,255,255,0.4);
            display: block;
            margin-top: 6px;
            text-transform: uppercase;
        }

        #status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px;
            padding: 8px 16px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.1em;
            backdrop-filter: blur(12px);
        }
        #status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #555;
            transition: background 0.3s, box-shadow 0.3s;
        }
        #status-dot.active {
            background: var(--volt);
            box-shadow: 0 0 8px var(--volt);
        }
        #status-text { transition: color 0.3s; }

        /* BOTTOM HUD */
        #hud {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 24px 32px;
            z-index: 100;
            pointer-events: none;
        }

        /* WEBCAM */
        #cam-wrap {
            position: relative;
            pointer-events: none;
        }
        #cam-label {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        #cam-border {
            position: relative;
            width: 200px;
            height: 150px;
            border: 1px solid rgba(0,255,204,0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        #cam-border::before, #cam-border::after {
            content: '';
            position: absolute;
            width: 12px; height: 12px;
            border-color: var(--acid);
            border-style: solid;
            z-index: 2;
        }
        #cam-border::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        #cam-border::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
        #video-el {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: block;
            filter: brightness(0.85) contrast(1.1);
        }
        #cam-scan {
            position: absolute;
            top: -2px; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--acid), transparent);
            animation: scan 2.5s linear infinite;
            z-index: 3;
        }
        @keyframes scan {
            0% { top: -2px; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* CONTROLS GUIDE */
        #controls {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }
        .ctrl {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.68rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.05em;
        }
        .ctrl-icon {
            font-size: 1rem;
            filter: grayscale(0.5);
        }
        .ctrl-bar {
            width: 60px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .ctrl-bar-fill {
            height: 100%;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear, background 0.3s;
        }

        /* SHAPE NAME DISPLAY */
        #shape-display {
            position: fixed;
            top: 50%;
            right: 32px;
            transform: translateY(-50%);
            z-index: 100;
            pointer-events: none;
        }
        .shape-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            opacity: 0.2;
            color: #fff;
            transition: opacity 0.4s, color 0.4s;
        }
        .shape-label.current {
            opacity: 1;
            color: var(--acid);
        }

        /* BIG CENTER OVERLAY WHEN NO HAND */
        #start-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            pointer-events: none;
            transition: opacity 1s;
        }
        #start-overlay.hidden { opacity: 0; }
        .big-emoji {
            font-size: 5rem;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(0,255,204,0.5));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-18px); }
        }
        #start-text {
            font-family: 'Unbounded', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: rgba(255,255,255,0.6);
            margin-top: 24px;
            letter-spacing: 0.1em;
        }
        #start-sub {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.25);
            margin-top: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* RIPPLE EFFECTS */
        .ripple {
            position: fixed;
            border-radius: 50%;
            border: 1px solid rgba(0,255,204,0.6);
            pointer-events: none;
            z-index: 200;
            transform: translate(-50%, -50%) scale(0);
            animation: ripple-out 0.8s ease-out forwards;
        }
        @keyframes ripple-out {
            to { transform: translate(-50%, -50%) scale(4); opacity: 0; }
        }

        /* BPM / PULSE RING */
        #pulse-ring {
            position: fixed;
            top: 50%; left: 50%;
            width: 200px; height: 200px;
            border: 1px solid rgba(0,255,204,0.0);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 8;
            transition: border-color 0.2s;
        }
    </style>
</head>
<body>

<!-- UI LAYER -->
<div id="cursor"></div>
<div id="cursor-dot"></div>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="pulse-ring"></div>

<div id="topbar">
    <div id="logo">
        GESTURE<span>·</span>NOVA
        <span class="sub">Hand-Powered Particle System</span>
    </div>
    <div id="status-pill">
        <div id="status-dot"></div>
        <span id="status-text">INITIALIZING</span>
    </div>
</div>

<div id="shape-display">
    <div class="shape-label current" id="lbl-0">HEART</div>
    <div class="shape-label" style="margin:12px 0" id="lbl-1">SATURN</div>
    <div class="shape-label" style="margin:12px 0" id="lbl-2">BLOOM</div>
    <div class="shape-label" style="margin:12px 0" id="lbl-3">DNA</div>
    <div class="shape-label" style="margin:12px 0" id="lbl-4">GALAXY</div>
    <div class="shape-label" style="margin:12px 0" id="lbl-5">CUBE</div>
    <div class="shape-label" id="lbl-6">STAR</div>
</div>

<div id="start-overlay" id="start-overlay">
    <div class="big-emoji">🖐</div>
    <div id="start-text">Show Your Hand to the Camera</div>
    <div id="start-sub">👍 Thumbs Up = Next Shape &nbsp;·&nbsp; ✌️ Peace = Prev Shape &nbsp;·&nbsp; 🤌 Pinch = Explode</div>
</div>

<div id="hud">
    <div id="cam-wrap">
        <div id="cam-label">◉ LIVE FEED</div>
        <div id="cam-border">
            <video id="video-el" autoplay playsinline></video>
            <div id="cam-scan"></div>
        </div>
    </div>

    <div id="controls">
        <div class="ctrl">
            <span>PINCH → EXPLODE</span>
            <span class="ctrl-icon">🤌</span>
            <div class="ctrl-bar"><div class="ctrl-bar-fill" id="bar-pinch" style="background:var(--acid)"></div></div>
        </div>
        <div class="ctrl">
            <span>THUMBS UP → NEXT SHAPE</span>
            <span class="ctrl-icon">👍</span>
            <div class="ctrl-bar"><div class="ctrl-bar-fill" id="bar-fist" style="background:var(--volt)"></div></div>
        </div>
        <div class="ctrl">
            <span>PEACE → PREV SHAPE</span>
            <span class="ctrl-icon">✌️</span>
            <div class="ctrl-bar"><div class="ctrl-bar-fill" id="bar-peace" style="background:var(--hot)"></div></div>
        </div>
        <div class="ctrl">
            <span>SWAY → COLOR</span>
            <span class="ctrl-icon">↔</span>
            <div class="ctrl-bar"><div class="ctrl-bar-fill" id="bar-hue" style="background:var(--hot)"></div></div>
        </div>
    </div>
</div>

<video id="video-container" autoplay playsinline style="display:none"></video>

<!-- SHADERS -->
<script id="vertexShader" type="x-shader/x-vertex">
    attribute vec3 aShapeA;   // "from" shape positions
    attribute vec3 aShapeB;   // "to"   shape positions
    attribute float aRandom;
    attribute float aPhase;

    uniform float uBlend;   // 0 = fully A, 1 = fully B
    uniform float uSpread;
    uniform float uTime;
    uniform float uHue;
    uniform float uPulse;

    varying vec3 vColor;
    varying float vAlpha;

    vec3 hsl2rgb(vec3 c) {
        vec3 rgb = clamp(abs(mod(c.x*6.0+vec3(0.0,4.0,2.0),6.0)-3.0)-1.0, 0.0, 1.0);
        return c.z + c.y * (rgb-0.5)*(1.0-abs(2.0*c.z-1.0));
    }

    void main() {
        // Smooth blend between the two active shapes
        vec3 pos = mix(aShapeA, aShapeB, smoothstep(0.0, 1.0, uBlend));

        // Pinch explosion
        pos *= (1.0 + uSpread * 6.0);

        // Pulse breath
        float breath = 1.0 + sin(uTime * 1.2 + aPhase) * 0.04 * (1.0 + uPulse * 3.0);
        pos *= breath;

        // Swirl drift
        float swirl    = uTime * 0.15 + aPhase;
        float swirlAmt = 0.4 + uSpread * 1.5;
        pos.x += sin(swirl + pos.y * 0.1) * swirlAmt;
        pos.y += cos(swirl + pos.x * 0.1) * swirlAmt * 0.5;
        pos.z += sin(swirl * 0.7 + aPhase) * swirlAmt * 0.8;

        float hueShift = uHue + aRandom * 0.35 + length(pos) * 0.006;
        float sat = 0.85 + sin(uTime * 0.5 + aPhase) * 0.1;
        float lit = 0.5  + sin(uTime * 0.8 + aPhase * 2.0) * 0.12;
        vColor = hsl2rgb(vec3(hueShift, sat, lit));

        vAlpha = 0.6 + 0.4 * sin(uTime * 0.5 + aPhase);

        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        float d = -mvPosition.z;
        gl_PointSize = (5.0 + aRandom * 3.0) * (35.0 / d);
        gl_PointSize = clamp(gl_PointSize, 1.0, 12.0);
        gl_Position  = projectionMatrix * mvPosition;
    }
</script>

<script id="fragmentShader" type="x-shader/x-fragment">
    varying vec3 vColor;
    varying float vAlpha;
    void main() {
        vec2 uv = gl_PointCoord - vec2(0.5);
        float d = length(uv);
        if(d > 0.5) discard;

        // Soft glow falloff
        float alpha = (1.0 - d * 2.0) * vAlpha;
        alpha = pow(alpha, 1.4);

        gl_FragColor = vec4(vColor, alpha);
    }
</script>

<!-- SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
/* ─── CURSOR ─── */
const cursor = document.getElementById('cursor');
const cursorDot = document.getElementById('cursor-dot');
document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
    cursorDot.style.left = e.clientX + 'px';
    cursorDot.style.top  = e.clientY + 'px';
});

/* ─── THREE SETUP ─── */
const scene = new THREE.Scene();
const camera3D = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera3D.position.z = 45;
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.prepend(renderer.domElement);

/* ─── PARTICLE GEOMETRY ─── */
const COUNT = 18000;
const geo = new THREE.BufferGeometry();

const randoms = new Float32Array(COUNT);
const phases  = new Float32Array(COUNT);
for (let i = 0; i < COUNT; i++) {
    randoms[i] = Math.random();
    phases[i]  = Math.random() * Math.PI * 2;
}

// ── Build all 7 shape position arrays ─────────────────────────────
function buildShapes(n) {
    const shapes = [];

    // 0 · HEART
    const heart = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
        const t = Math.random() * Math.PI * 2;
        heart[i*3]   = 16 * Math.pow(Math.sin(t), 3) * 0.55;
        heart[i*3+1] = (13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)) * 0.55;
        heart[i*3+2] = (Math.random() - 0.5) * 4;
    }
    shapes.push(heart);

    // 1 · SATURN  (ringed planet)
    const saturn = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
        if (Math.random() < 0.28) {
            const u = Math.random()*Math.PI*2, v = Math.acos(2*Math.random()-1), r = 6+Math.random()*2;
            saturn[i*3]   = r * Math.sin(v) * Math.cos(u);
            saturn[i*3+1] = r * Math.sin(v) * Math.sin(u) * 0.85;
            saturn[i*3+2] = r * Math.cos(v);
        } else {
            const a = Math.random()*Math.PI*2, r = 11+Math.random()*8;
            saturn[i*3]   = Math.cos(a) * r;
            saturn[i*3+1] = Math.sin(a) * r * 0.14;
            saturn[i*3+2] = (Math.random()-0.5) * 1.2;
        }
    }
    shapes.push(saturn);

    // 2 · BLOOM  (7-petal flower sphere)
    const bloom = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
        const u = Math.random()*Math.PI*2, v = Math.random()*Math.PI;
        const r = 10 + 5*Math.sin(7*u)*Math.sin(4*v);
        bloom[i*3]   = r * Math.sin(v) * Math.cos(u);
        bloom[i*3+1] = r * Math.sin(v) * Math.sin(u);
        bloom[i*3+2] = r * Math.cos(v);
    }
    shapes.push(bloom);

    // 3 · DNA  (double helix)
    const dna = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
        const strand = i % 2;           // 0 or 1 = two strands
        const t  = (i / n) * Math.PI * 16 - Math.PI * 8;
        const offset = strand * Math.PI; // 180° apart
        const radius = 5 + Math.random() * 0.8;
        dna[i*3]   = Math.cos(t + offset) * radius;
        dna[i*3+1] = t * 1.1 + (Math.random()-0.5);
        dna[i*3+2] = Math.sin(t + offset) * radius;
        // Rungs (every ~10th particle)
        if (i % 10 === 0) {
            const rung = Math.random();
            dna[i*3]   = (rung - 0.5) * 10;
            dna[i*3+1] = t * 1.1;
            dna[i*3+2] = 0;
        }
    }
    shapes.push(dna);

    // 4 · GALAXY  (spiral arms)
    const galaxy = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
        const arm    = Math.floor(Math.random() * 3); // 3 arms
        const t      = Math.random() * Math.PI * 4;
        const spread = Math.random() * 2.5;
        const r      = t * 1.6 + spread;
        const angle  = t + (arm * Math.PI * 2 / 3);
        galaxy[i*3]   = Math.cos(angle) * r;
        galaxy[i*3+1] = (Math.random()-0.5) * 2 * (1 - t/(Math.PI*4));
        galaxy[i*3+2] = Math.sin(angle) * r;
    }
    shapes.push(galaxy);

    // 5 · CUBE  (hollow wireframe cube)
    const cube = new Float32Array(n * 3);
    const S = 10; // half-size
    for (let i = 0; i < n; i++) {
        // Pick a random edge of the cube
        const edge = Math.floor(Math.random() * 12);
        const t2 = Math.random();
        const edges = [
            [-S,-S,-S, S,-S,-S], [-S,-S, S, S,-S, S],
            [-S, S,-S, S, S,-S], [-S, S, S, S, S, S],
            [-S,-S,-S,-S, S,-S], [ S,-S,-S, S, S,-S],
            [-S,-S, S,-S, S, S], [ S,-S, S, S, S, S],
            [-S,-S,-S,-S,-S, S], [ S,-S,-S, S,-S, S],
            [-S, S,-S,-S, S, S], [ S, S,-S, S, S, S],
        ];
        const e = edges[edge];
        cube[i*3]   = e[0] + (e[3]-e[0])*t2 + (Math.random()-0.5)*1.5;
        cube[i*3+1] = e[1] + (e[4]-e[1])*t2 + (Math.random()-0.5)*1.5;
        cube[i*3+2] = e[2] + (e[5]-e[2])*t2 + (Math.random()-0.5)*1.5;
    }
    shapes.push(cube);

    // 6 · STAR  (5-pointed 3D star)
    const star = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
        // Distribute along the 5 points and the inner body
        const numPoints = 5;
        const t = (i / n) * Math.PI * 2;
        // Alternate between outer spike tips and inner valleys
        const starR = (k) => {
            const angle = k * Math.PI * 2;
            const a = ((angle % (Math.PI * 2 / numPoints)) / (Math.PI * 2 / numPoints));
            return a < 0.5
                ? 12 * (0.5 + a)           // ramp out to spike tip
                : 12 * (1.5 - a);          // ramp back to inner
        };
        const outerR = 13;
        const innerR = 5.5;
        const spikeAngle = (Math.floor(Math.random() * numPoints) / numPoints) * Math.PI * 2;
        const inSpike = Math.random();
        const r = inSpike < 0.6
            ? outerR * Math.random()        // along spike
            : innerR + Math.random() * (outerR - innerR) * 0.3; // inner ring

        const angle = spikeAngle + (inSpike < 0.6
            ? (Math.random() - 0.5) * 0.25  // tight along spike
            : Math.random() * (Math.PI * 2 / numPoints)); // spread inner

        // 3D: extrude along Z with taper
        const zDepth = 3.5 * (1 - r / outerR);
        const zSign  = Math.random() < 0.5 ? 1 : -1;

        star[i*3]   = Math.cos(angle) * r;
        star[i*3+1] = Math.sin(angle) * r;
        star[i*3+2] = zSign * zDepth * Math.random() + (Math.random()-0.5) * 0.8;
    }
    shapes.push(star);

    return shapes;
}

const allShapes = buildShapes(COUNT);

// Two dynamic GPU buffers that we swap when shape changes
const bufA = new THREE.BufferAttribute(allShapes[0].slice(), 3);
const bufB = new THREE.BufferAttribute(allShapes[1].slice(), 3);

geo.setAttribute('aShapeA',  bufA);
geo.setAttribute('aShapeB',  bufB);
geo.setAttribute('position', new THREE.BufferAttribute(allShapes[0].slice(), 3));
geo.setAttribute('aRandom',  new THREE.BufferAttribute(randoms, 1));
geo.setAttribute('aPhase',   new THREE.BufferAttribute(phases,  1));

const mat = new THREE.ShaderMaterial({
    uniforms: {
        uBlend:  { value: 0 },
        uSpread: { value: 0 },
        uHue:    { value: 0.55 },
        uTime:   { value: 0 },
        uPulse:  { value: 0 }
    },
    vertexShader:   document.getElementById('vertexShader').textContent,
    fragmentShader: document.getElementById('fragmentShader').textContent,
    transparent: true,
    depthWrite:  false,
    blending:    THREE.AdditiveBlending
});

const points = new THREE.Points(geo, mat);
scene.add(points);

/* Add a faint background star field */
const starGeo = new THREE.BufferGeometry();
const starPts = new Float32Array(3000 * 3);
for (let i = 0; i < 3000; i++) {
    const i3 = i * 3;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 80 + Math.random() * 40;
    starPts[i3]   = r * Math.sin(phi) * Math.cos(theta);
    starPts[i3+1] = r * Math.sin(phi) * Math.sin(theta);
    starPts[i3+2] = r * Math.cos(phi);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPts, 3));
const starMat = new THREE.PointsMaterial({ size: 0.25, color: 0xffffff, transparent: true, opacity: 0.3 });
scene.add(new THREE.Points(starGeo, starMat));

/* ─── MEDIAPIPE ─── */
const videoElement = document.getElementById('video-el');
const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const overlay    = document.getElementById('start-overlay');
const barPinch   = document.getElementById('bar-pinch');
const barHue     = document.getElementById('bar-hue');
const pulseRing  = document.getElementById('pulse-ring');
const shapeLbls = Array.from({length: 7}, (_, i) => document.getElementById('lbl-' + i));

let trackingActive = false;
let lastPinchDist  = 0;
let pulseTimeout;

// ── SHAPE STATE ──────────────────────────────────────────────────
const SHAPES = ['HEART','SATURN','BLOOM','DNA','GALAXY','CUBE','STAR'];
const NUM_SHAPES = SHAPES.length;
let currentShape = 0;  // index into allShapes
let blendDir     = 1;  // which direction we're blending (unused for display)

// GPU blend: 0=fully A, 1=fully B
// When we change shape: load new shape into B, animate blend 0→1, then swap A←B, reset blend=0
let blendValue   = 0;
let blendTarget  = 0;
let transitioning = false;

function setShape(idx) {
    const next = ((idx % NUM_SHAPES) + NUM_SHAPES) % NUM_SHAPES;
    if (next === currentShape || transitioning) return;

    // Load next shape into buffer B
    bufB.array.set(allShapes[next]);
    bufB.needsUpdate = true;

    blendTarget   = 1;
    transitioning = true;

    // After transition completes, snap: A = next, blend = 0
    setTimeout(() => {
        bufA.array.set(allShapes[next]);
        bufA.needsUpdate = true;
        mat.uniforms.uBlend.value = 0;
        blendValue  = 0;
        blendTarget = 0;
        transitioning = false;
        currentShape = next;
        updateShapeLabels(currentShape);
    }, 1400); // matches lerp speed

    triggerPulse();
    gestureCD = 40;
    showFlash(SHAPES[next]);
    updateShapeLabels(next); // preview immediately
}

function updateShapeLabels(idx) {
    shapeLbls.forEach(l => l.classList.remove('current'));
    if (shapeLbls[idx]) shapeLbls[idx].classList.add('current');
}

function triggerPulse() {
    pulseRing.style.borderColor = 'rgba(0,255,204,0.5)';
    pulseRing.style.transform = 'translate(-50%,-50%) scale(1)';
    pulseRing.style.transition = 'none';
    requestAnimationFrame(() => {
        pulseRing.style.transition = 'transform 0.6s ease-out, border-color 0.6s ease-out, opacity 0.6s';
        pulseRing.style.transform = 'translate(-50%,-50%) scale(4)';
        pulseRing.style.borderColor = 'transparent';
    });
}

// Gesture hold timers
const HOLD_FRAMES = 14;
let fistHeld  = 0;
let peaceHeld = 0;
let gestureCD = 0;

/* ── GESTURE DETECTORS ──────────────────────────────────────────────
   MediaPipe landmark indices:
   Fingertips: thumb=4, index=8, middle=12, ring=16, pinky=20
   Knuckles:   index=5, middle=9,  ring=13,  pinky=17
   ------------------------------------------------------------------ */

/** Returns 0-1 curl for a single finger (0=extended, 1=fully curled) */
function fingerCurl(lm, tipIdx, mcpIdx) {
    const tip = lm[tipIdx];
    const mcp = lm[mcpIdx];
    // If tip is below MCP (in image Y space, which is flipped), finger is curled
    return tip.y > mcp.y ? 1 : 0;
}

/** Count extended fingers (not counting thumb) */
function extendedFingers(lm) {
    // index, middle, ring, pinky
    const tips = [8, 12, 16, 20];
    const mcps = [5,  9, 13, 17];
    return tips.reduce((n, tip, i) => n + (lm[tip].y < lm[mcps[i]].y ? 1 : 0), 0);
}

/** Thumbs Up: all 4 fingers curled, thumb tip clearly above index knuckle */
function isThumbsUp(lm) {
    const fingersCurled = extendedFingers(lm) === 0;
    const thumbUp = lm[4].y < lm[5].y - 0.04; // thumb tip well above index MCP
    return fingersCurled && thumbUp;
}

/** Peace / V-sign: index + middle extended, ring + pinky curled */
function isPeace(lm) {
    const idxExt  = lm[8].y  < lm[5].y;   // index extended
    const midExt  = lm[12].y < lm[9].y;   // middle extended
    const ringCrl = lm[16].y > lm[13].y;  // ring curled
    const pnkCrl  = lm[20].y > lm[17].y;  // pinky curled
    return idxExt && midExt && ringCrl && pnkCrl;
}

// Flash canvas element for shape name announcement
const flashEl = document.createElement('div');
flashEl.style.cssText = `
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:'Unbounded',sans-serif; font-size:clamp(3rem,8vw,7rem);
    font-weight:900; letter-spacing:-0.02em; color:#fff;
    pointer-events:none; z-index:200; text-align:center;
    text-shadow:0 0 60px rgba(0,255,204,0.8), 0 0 120px rgba(0,255,204,0.3);
    transition:opacity 0.5s;
    opacity:0;
`;
document.body.appendChild(flashEl);

let flashTimer;
function showFlash(text) {
    flashEl.textContent = text;
    flashEl.style.transition = 'none';
    flashEl.style.opacity = '1';
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => {
        flashEl.style.transition = 'opacity 0.8s';
        flashEl.style.opacity = '0';
    }, 700);
}

const barFist  = document.getElementById('bar-fist');
const barPeace = document.getElementById('bar-peace');

const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        if (!trackingActive) {
            trackingActive = true;
            statusDot.classList.add('active');
            statusText.textContent = 'TRACKING';
            overlay.classList.add('hidden');
        }

        const lm = results.multiHandLandmarks[0];

        // ── Pinch: thumb tip #4 vs index tip #8 ──
        const dx   = lm[4].x - lm[8].x;
        const dy   = lm[4].y - lm[8].y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        // Quick pinch squeeze = manual pulse burst
        if (lastPinchDist - dist > 0.06) {
            triggerPulse();
            mat.uniforms.uPulse.value = 1.0;
            clearTimeout(pulseTimeout);
            pulseTimeout = setTimeout(() => { mat.uniforms.uPulse.value = 0; }, 400);
        }
        lastPinchDist = dist;
        mat.uniforms.uSpread.value = THREE.MathUtils.lerp(mat.uniforms.uSpread.value, dist, 0.12);

        // ── Gesture detection (only if not in cooldown) ──
        if (gestureCD > 0) gestureCD--;

        const fist  = isThumbsUp(lm);
        const peace = isPeace(lm);

        if (fist && !peace && gestureCD === 0) {
            fistHeld++;
            peaceHeld = 0;
        } else if (peace && !fist && gestureCD === 0) {
            peaceHeld++;
            fistHeld = 0;
        } else {
            fistHeld  = Math.max(0, fistHeld  - 2);
            peaceHeld = Math.max(0, peaceHeld - 2);
        }

        // Trigger shape change when hold threshold reached
        if (fistHeld >= HOLD_FRAMES) {
            setShape(currentShape + 1);
            fistHeld = 0;
        }
        if (peaceHeld >= HOLD_FRAMES) {
            setShape(currentShape - 1);
            peaceHeld = 0;
        }

        // ── Smoothly animate blend toward target ──
        blendValue = THREE.MathUtils.lerp(blendValue, blendTarget, 0.035);
        mat.uniforms.uBlend.value = blendValue;

        // ── Wrist X → hue & rotation ──
        const hueTarget = lm[0].x;
        mat.uniforms.uHue.value = THREE.MathUtils.lerp(mat.uniforms.uHue.value, hueTarget, 0.08);
        points.rotation.y = THREE.MathUtils.lerp(points.rotation.y, (lm[0].x - 0.5) * 2.5, 0.05);
        points.rotation.x = THREE.MathUtils.lerp(points.rotation.x, (lm[0].y - 0.5) * -0.8, 0.05);

        // ── HUD bars ──
        barPinch.style.width  = Math.min(dist * 400, 100) + '%';
        barFist.style.width   = Math.min(fistHeld  / HOLD_FRAMES * 100, 100) + '%';
        barPeace.style.width  = Math.min(peaceHeld / HOLD_FRAMES * 100, 100) + '%';
        barHue.style.width    = (hueTarget * 100) + '%';
        barHue.style.background = `hsl(${hueTarget * 360},80%,60%)`;

        // Color fist/peace bars when charging
        barFist.style.background  = fistHeld  > 5 ? 'var(--volt)' : 'rgba(255,255,255,0.3)';
        barPeace.style.background = peaceHeld > 5 ? 'var(--hot)'  : 'rgba(255,255,255,0.3)';

        // Status shows current gesture
        if (fist)       statusText.textContent = '👍 THUMBS UP – HOLD…';
        else if (peace) statusText.textContent = '✌️ PEACE – HOLD…';
        else            statusText.textContent = 'TRACKING';

    } else {
        if (trackingActive) {
            trackingActive = false;
            statusDot.classList.remove('active');
            statusText.textContent = 'SEARCHING';
            overlay.classList.remove('hidden');
        }
        fistHeld = peaceHeld = 0;
    }
});

const cameraFeed = new Camera(videoElement, {
    onFrame: async () => { await hands.send({ image: videoElement }); },
    width: 640, height: 480
});
cameraFeed.start().then(() => {
    statusText.textContent = 'CAMERA READY';
}).catch(() => {
    statusText.textContent = 'CAMERA ERROR';
});

/* ─── SLOW AUTO-ROTATE when no hand ─── */
let autoRotY = 0;

/* ─── ANIMATION LOOP ─── */
function animate() {
    requestAnimationFrame(animate);
    mat.uniforms.uTime.value += 0.012;

    if (!trackingActive) {
        autoRotY += 0.003;
        points.rotation.y = autoRotY;
        points.rotation.x = Math.sin(mat.uniforms.uTime.value * 0.3) * 0.2;
        blendValue = THREE.MathUtils.lerp(blendValue, blendTarget, 0.03);
        mat.uniforms.uBlend.value = blendValue;
    }

    renderer.render(scene, camera3D);
}
animate();

window.addEventListener('resize', () => {
    camera3D.aspect = innerWidth / innerHeight;
    camera3D.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

/* ─── CLICK RIPPLE ─── */
document.addEventListener('click', e => {
    const r = document.createElement('div');
    r.className = 'ripple';
    r.style.left = e.clientX + 'px';
    r.style.top  = e.clientY + 'px';
    r.style.width = r.style.height = '60px';
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 900);
});
</script>
</body>
</html>
